services:
  caddy:
    image: caddy:2.7-alpine
    container_name: ecomm-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - keycloak

  postgres:
    image: postgres:16-alpine
    container_name: ecomm-db-prod
    environment:
      POSTGRES_DB: ${DB_NAME:-ecomm}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-ecomm}"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ecomm-auth-prod
    # Added KC_HTTP_RELATIVE_PATH and fixed the command
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-ecomm}
      KC_DB_USERNAME: ${DB_USER:-user}
      KC_DB_PASSWORD: ${DB_PASSWORD:-password}
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # This is critical for serving Keycloak under /auth
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: https://localhost/auth
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecomm-backend-prod
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-ecomm}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-password}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_INTERNAL_URL}/auth/realms/${KC_REALM}/protocol/openid-connect/certs
      JWT_EXPECTED_ISSUER: ${KEYCLOAK_EXTERNAL_URL}/realms/${KC_REALM}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_KEYCLOAK_URL=${KEYCLOAK_EXTERNAL_URL}
        - VITE_KEYCLOAK_REALM=${KC_REALM}
        - VITE_KEYCLOAK_CLIENT_ID=${KC_CLIENT_ID}
        - VITE_API_URL=${BACKEND_EXTERNAL_URL}
    container_name: ecomm-frontend-prod
    environment:
      - PORT=3000
      - HOST=0.0.0.0

volumes:
  postgres_prod_data:
  caddy_data:
  caddy_config:
