server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecomm}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  security:
    oauth2:
      resourceserver:
        jwt:
          # This is the internal URI used for fetching public keys
          jwk-set-uri: ${JWK_SET_URI:http://localhost:8081/realms/ecomm-realm/protocol/openid-connect/certs}

# This is the external issuer URI that browser tokens use
jwt:
  expected-issuer: ${EXPECTED_ISSUER:http://localhost:8081/realms/ecomm-realm}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
